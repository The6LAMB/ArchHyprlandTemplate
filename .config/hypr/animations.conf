# ================================================
# ANIMATIONS - Animations et transitions
# ================================================

animations {
    enabled = true
    
    # Courbes de Bézier personnalisées
    bezier = myBezier, 0.05, 0.9, 0.1, 1.0
    bezier = smooth, 0.25, 0.1, 0.25, 1.0
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    
    # Animations des fenêtres
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, myBezier, popin 80%
    animation = windowsMove, 1, 6, myBezier
    
    # Animations des bordures
    animation = border, 1, 10, myBezier
    animation = borderangle, 1, 8, myBezier
    
    # Animations de fade
    animation = fade, 1, 7, myBezier
    animation = fadeIn, 1, 7, myBezier
    animation = fadeOut, 1, 7, myBezier
    animation = fadeSwitch, 1, 7, myBezier
    animation = fadeShadow, 1, 7, myBezier
    animation = fadeDim, 1, 7, myBezier
    
    # Animations des workspaces
    animation = workspaces, 1, 6, myBezier, slide
    animation = specialWorkspace, 1, 6, myBezier, slidevert
}
