# ================================================
# INPUT - Configuration clavier et souris
# ================================================

input {
    # Clavier - Layout Suisse Français
    kb_layout = ch
    kb_variant = fr
    kb_model =
    kb_options =
    kb_rules =

    # Souris
    follow_mouse = 1
    sensitivity = 0  # -1.0 à 1.0, 0 = pas de modification
    accel_profile = flat  # ou "adaptive"

    # Touchpad
    touchpad {
        natural_scroll = false
        tap-to-click = true
        tap-and-drag = true
        clickfinger_behavior = false
        middle_button_emulation = false
    }
}
