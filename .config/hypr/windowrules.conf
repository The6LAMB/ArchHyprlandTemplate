# ================================================
# WINDOW RULES - Règles pour les fenêtres
# Syntaxe mise à jour pour Hyprland 0.53+
# ================================================

# ================================================
# WORKSPACES ASSIGNÉS
# ================================================

# Workspace 1 - Terminal
windowrule = workspace 1, match:class ^(kitty)$

# Workspace 2 - Code/Dev
windowrule = workspace 2, match:class ^(code-oss)$
windowrule = workspace 2, match:class ^(Code)$
windowrule = workspace 2, match:class ^(jetbrains-clion)$
windowrule = workspace 2, match:class ^(jetbrains-pycharm)$
windowrule = workspace 2, match:class ^(jetbrains-webstorm)$
windowrule = workspace 2, match:class ^(jetbrains-idea)$
# Workspace 3 - Navigateurs
windowrule = workspace 3, match:class ^(firefoxdeveloperedition)$
windowrule = workspace 3, match:class ^(firefox)$
windowrule = workspace 3, match:class ^(chrome)$
windowrule = workspace 3, match:class ^(brave)$

# Workspace 4 - Productivité
windowrule = workspace 4, match:class ^(craft—afreshtakeondocuments-nativefier-e0958b)$
windowrule = workspace 4, match:class ^(notion-app-enhanced)$
windowrule = workspace 4, match:class ^(obsidian)$
windowrule = workspace 4, match:class ^(org.gnome.Evince)$

# Workspace 5 - Fichiers
windowrule = workspace 5, match:class ^(thunar)$
windowrule = workspace 5, match:class ^(Thunar)$
windowrule = workspace 5, match:class ^(org.kde.dolphin)$
windowrule = workspace 5, match:title ^(ranger)$

# Workspace 6 - Social
windowrule = workspace 6, match:class ^(org.telegram.desktop)$
windowrule = workspace 6, match:class ^(discord)$
windowrule = workspace 6, match:class ^(Discord)$

# Workspace 7 - Musique
windowrule = workspace 7, match:class ^(Cider)$
windowrule = workspace 7, match:class ^(spotify)$
windowrule = workspace 7, match:class ^(Spotify)$

# Workspace 8 - Gaming
windowrule = workspace 8, match:class ^(Minecraft Launcher)$
windowrule = workspace 8, match:class ^(steam)$

# ================================================
# FENÊTRES FLOTTANTES
# ================================================
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(nwg-look)$
windowrule = float on, match:class ^(qt5ct)$
windowrule = float on, match:class ^(qt6ct)$
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = float on, match:title ^(Firefox — Sharing Indicator)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float on, match:class ^(rofi)$
windowrule = float on, match:class ^(Rofi)$

# ================================================
# OPACITÉ PERSONNALISÉE
# ================================================
windowrule = opacity 0.9 0.7, match:class ^(kitty)$
windowrule = opacity 0.9 0.8, match:class ^(thunar)$
windowrule = opacity 1.0 1.0, match:class ^(firefox)$
windowrule = opacity 1.0 1.0, match:class ^(discord)$
windowrule = opacity 0.95 0.85, match:class ^(code)$

# ================================================
# TAILLES ET POSITIONS
# ================================================

# Pavucontrol centré
windowrule = size 800 600, match:class ^(pavucontrol)$
windowrule = center on, match:class ^(pavucontrol)$

# Rofi centré
windowrule = center on, match:class ^(rofi)$
windowrule = center on, match:title ^(jetbrains-clion)$
windowrule = center on, match:title ^(jetbrains-pycharm)$
windowrule = center on, match:title ^(jetbrains-webstorm)$
windowrule = center on, match:title ^(jetbrains-idea)$
# ================================================
# RÈGLES SPÉCIALES
# ================================================

# Picture-in-Picture toujours au premier plan
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = size 640 360, match:title ^(Picture-in-Picture)$
windowrule = move 100%-660 100%-400, match:title ^(Picture-in-Picture)$

# Pas de bordures pour les fenêtres en fullscreen
windowrule = border_size 0, match:fullscreen 1
windowrule = border_size 0, match:float 1

# Fix global - toute fenêtre flottante est centrée automatiquement
# Toutes les fenêtres flottantes centrées (règle générale)
windowrule = center on, match:float true

# JetBrains override - near cursor plutôt que centré (doit être APRÈS)
windowrule = stay_focused on, match:class ^(jetbrains-.*)$, match:float true
windowrule = move onscreen cursor, match:class ^(jetbrains-.*)$, match:float true

# ================================================
# IDLE INHIBIT (empêcher veille)
# ================================================
# idleinhibit a été supprimé des windowrules dans Hyprland 0.53.
# Configurer hypridle directement dans ~/.config/hypr/hypridle.conf
# avec : ignore_dbus_inhibit = false (valeur par défaut)
# mpv et vlc envoient automatiquement un signal D-Bus pour bloquer la veille.
