# ╔══════════════════════════════════════════════════════════════════╗
# ║  hyprlock.conf — SilentSDDM "Rei" style                        ║
# ║  Accent: #C3C6FB  |  BG: #000000  |  Font: Red Hat Display     ║
# ╚══════════════════════════════════════════════════════════════════╝

$accent    = rgba(195, 198, 251, 1.0)
$accentDim = rgba(195, 198, 251, 0.7)
$accentLow = rgba(195, 198, 251, 0.4)
$bg        = rgba(0, 0, 0, 1.0)

general {
    ignore_empty_input = true
    text_trim = false
}


# ── Background ────────────────────────────────────────────────────
# Image random choisie par blazinlock via symlink
background {
    monitor =
    path = /tmp/hyprlock-wallpaper
    color = $bg
    blur_size = 0
    blur_passes = 0
    brightness = 1
    contrast = 0.9
    vibrancy = 0.1
    zindex = -1
}


# ══════════════════════════════════════════════════════════════════
#  GAUCHE — Horloge / Date / Username / Password
# ══════════════════════════════════════════════════════════════════

# ── Horloge ───────────────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    color = $accent
    font_size = 140
    font_family = Red Hat Display Black
    shadow_passes = 2
    shadow_boost = 0.3
    shadow_color = $bg

    position = 200, 180
    halign = left
    valign = center
    zindex = 5
}

# ── Date ──────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d, %Y")"
    color = $accent
    font_size = 28
    font_family = Red Hat Display SemiBold
    shadow_passes = 1
    shadow_boost = 0.3
    shadow_color = $bg

    position = 210, 60
    halign = left
    valign = center
    zindex = 5
}

# ── Username ──────────────────────────────────────────────────────
label {
    monitor =
    text = $USER
    color = $accent
    font_size = 20
    font_family = Red Hat Display Bold

    position = 210, -30
    halign = left
    valign = center
    zindex = 5
}

# ── Champ mot de passe ────────────────────────────────────────────
input-field {
    monitor =
    size = 260, 50
    outline_thickness = 2
    rounding = 10

    outer_color = $accent
    inner_color = rgba(195, 198, 251, 0.1)
    font_color = $accent
    font_family = Red Hat Display

    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1

    fade_on_empty = true
    fade_timeout = 1500

    placeholder_text = <i><span foreground="#C3C6FB">●●●●●●</span></i>
    hide_input = false

    check_color = $accent
    fail_color = rgba(255, 85, 85, 1.0)
    fail_text = <i><span foreground="#ffffff">$FAIL</span></i>
    fail_transition = 300
    capslock_color = rgba(241, 250, 140, 1.0)

    position = 210, -90
    halign = left
    valign = center
    zindex = 10
}

# ── Icône cadenas ─────────────────────────────────────────────────
label {
    monitor =
    text = 
    color = $accentDim
    font_size = 18
    font_family = Font Awesome 6 Free Solid

    position = 210, -145
    halign = left
    valign = center
    zindex = 2
}


# ══════════════════════════════════════════════════════════════════
#  BARRE DU BAS
# ══════════════════════════════════════════════════════════════════

shape {
    monitor =
    size = 100%, 60
    color = $bg

    halign = center
    valign = bottom
    zindex = 0
}

# ── Photo de profil ───────────────────────────────────────────────
image {
    monitor =
    path = $HOME/.face.icon
    size = 42
    rounding = 10
    border_size = 2
    border_color = $accent

    position = 14, 9
    halign = left
    valign = bottom
    zindex = 3
}

# ── Username (barre) ─────────────────────────────────────────────
label {
    monitor =
    text = $USER
    color = $accent
    font_size = 14
    font_family = Red Hat Display Bold Italic
    shadow_passes = 1
    shadow_boost = 0.5
    shadow_color = $bg

    position = 66, 28
    halign = left
    valign = bottom
    zindex = 2
}

# ── Hostname ──────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:24000000] echo "@$(uname -n)"
    color = $accentDim
    font_size = 14
    font_family = Red Hat Display Italic
    shadow_passes = 1
    shadow_boost = 0.5
    shadow_color = $bg

    position = 66, -20
    halign = left
    valign = bottom
    zindex = 2
}

# ── Pastille Session ──────────────────────────────────────────────
shape {
    monitor =
    size = 150, 32
    rounding = 10
    color = $accent

    halign = center
    valign = bottom
    position = 0, 14
    zindex = 1
}

label {
    monitor =
    text = cmd[update:24000000] echo "Session : $XDG_SESSION_DESKTOP"
    color = $bg
    font_size = 11
    font_family = Red Hat Display Medium

    position = 0, -5
    halign = center
    valign = bottom
    zindex = 2
}

# ── Pastille Batterie ─────────────────────────────────────────────
shape {
    monitor =
    size = 70, 32
    rounding = 10
    color = $accent

    halign = right
    valign = bottom
    position = -14, 14
    zindex = 1
}

label {
    monitor =
    text = cmd[update:5000] ~/.config/hypr/hyprlock/blazinscripts.sh -bat
    color = $bg
    font_size = 13
    font_family = Red Hat Display Bold

    position = -21, -8
    halign = right
    valign = bottom
    zindex = 2
}
