# ================================================
# LAYOUTS - Configuration des layouts
# ================================================

# Dwindle Layout (par défaut)
dwindle {
    pseudotile = true  # Pseudo-tiling pour fenêtres qui ne supportent pas le tiling
    preserve_split = true  # Conserver la direction du split
    force_split = 0  # 0 = automatique, 1 = split à gauche, 2 = split en haut
    split_width_multiplier = 1.0
    use_active_for_splits = true
}

# Master Layout (alternatif)
master {
    # Corrigé pour Hyprland 0.52+
    new_status = master  # nouvelle fenêtre devient master (était "new_is_master")
    new_on_top = false
    orientation = left
    mfact = 0.55
}

# Gestures (gestes tactiles)
gestures {
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true
    workspace_swipe_forever = false
}
