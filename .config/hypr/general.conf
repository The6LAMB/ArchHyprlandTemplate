# ================================================
# GENERAL - Configuration générale
# ================================================

general {
    # Espaces entre fenêtres
    gaps_in = 5
    gaps_out = 6
    
    # Bordures
    border_size = 3
    
    # Couleurs des bordures (depuis Pywal)
    # Note: le gradient complexe peut causer des erreurs
    # Syntaxe correcte pour Hyprland 0.52+
    col.active_border = $color11 $color14 45deg
    col.inactive_border = rgba(59595900)
    
    # Layout par défaut
    layout = dwindle
    
    # Autres options
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true
}

# Divers
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vrr = 0  # Variable Refresh Rate (1 = activé)
    focus_on_activate = true
}
