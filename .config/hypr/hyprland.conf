# ================================================
# HYPRLAND CONFIG - Main File
# ================================================
# Configuration modulaire pour Hyprland 0.52.1
# Créé pour: lamb@RogStrixArch
# ================================================

# Variables
$scripts = $HOME/.config/hypr/scripts
$mainMod = SUPER

# ================================================
# SOURCES - Fichiers de configuration séparés
# ================================================

source = ~/.cache/wal/colors-hyprland.conf

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/environment.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/general.conf
source = ~/.config/hypr/decoration.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/layouts.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/windowrules.conf
bind = Super, L, exec,  # launch lock screen
